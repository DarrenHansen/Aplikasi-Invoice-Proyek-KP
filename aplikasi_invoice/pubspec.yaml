name: aplikasi_invoice
description: "Aplikasi Invoice Generator dengan fitur lengkap untuk bisnis."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  # ... existing dependencies
  sqflite_common_ffi: ^2.3.0+4  # Tambahkan ini untuk web support
  
  # UI & Icons
  cupertino_icons: ^1.0.8
  
  # Database
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.0.0
  
  # State Management
  provider: ^6.1.1
  
  # Tanda Tangan Digital
  signature: ^5.4.0
  
  # Format Tanggal & Mata Uang
  intl: ^0.19.0
  
  # Image Picker untuk Logo
  image_picker: ^1.0.7
  
  # PDF Generation & Export
  pdf: ^3.10.7
  printing: ^5.11.1
  
  # Share ke WhatsApp/Email
  share_plus: ^7.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  # Assets - Sementara dinonaktifkan
  # assets:
  #   - assets/images/